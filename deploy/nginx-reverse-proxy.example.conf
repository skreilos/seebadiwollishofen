# Beispiel: Reverse Proxy für seebadiwollishofen.ch → Seebadi-Docker (Port 8081 auf dem Host)
#
# VORHER KLÄREN (auf dem Server ausführen — siehe deploy/PROXY-CHECK.md):
# - Läuft dieser Nginx auf dem HOST oder in einem DOCKER-Container?
# - Läuft Seebadi mit "ports: 8081:80" und ist curl http://127.0.0.1:8081/ lokal ok?
#
# Diese Datei NICHT blind kopieren — den proxy_pass-Ziel-Host an dein Setup anpassen.

# ---------------------------------------------------------------------------
# FALL 1: Nginx läuft auf dem HOST (systemd-Paket nginx, nicht Docker)
# ---------------------------------------------------------------------------
# proxy_pass http://127.0.0.1:8081;

# ---------------------------------------------------------------------------
# FALL 2: Nginx läuft in Docker — Seebadi-Port ist auf dem HOST gebunden (8081)
# ---------------------------------------------------------------------------
# Im Nginx-Compose ggf. extra_hosts nutzen (siehe PROXY-CHECK.md), dann:
# proxy_pass http://host.docker.internal:8081;

# ---------------------------------------------------------------------------
# FALL 3: Nginx + Seebadi im gleichen Docker-Netz (ohne Host-Port nötig)
# ---------------------------------------------------------------------------
# Seebadi-Compose: container_name: seebadiwollishofen-web + gemeinsames Netzwerk
# proxy_pass http://seebadiwollishofen-web:80;

server {
    listen 80;
    listen [::]:80;
    server_name seebadiwollishofen.ch www.seebadiwollishofen.ch;

    location / {
        # ANPASSEN: einen der drei Fälle oben wählen
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Nach TLS (Certbot o. Ä.): zusätzlicher server { listen 443 ssl; ... } Block
# mit gleichem location / und proxy_pass.
